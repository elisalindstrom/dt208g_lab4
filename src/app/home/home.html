<h1>Webbutveckling - Ramschema</h1>

<label for="filter">
    <input type="text" id="filter" placeholder="Sök efter kurskod eller kursnamn" autocomplete="off"
        [value]="filterCourses()" (input)="filterCourses.set($any($event.target).value)">
</label>

@if (error()) {
<p>{{ error() }}</p>
}

<table>
    <thead>
        <tr>
            <th>Kurskod</th>
            <th>Kursnamn</th>
            <th>Progression</th>
        </tr>
    </thead>

    <tbody>
        @for (course of filteredCourses(); track course.code) {
        <tr>
            <td>{{ course.code | uppercase }}</td>
            <td>{{ course.coursename }}</td>
            <td>{{ course.progression }}</td>
        </tr>
        }
    </tbody>
</table>
